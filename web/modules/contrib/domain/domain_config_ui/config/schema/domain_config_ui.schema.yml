# Schema for the configuration files of the Domain Config UI module.
domain_config_ui.settings:
  type: config_object
  label: 'Domain Config UI settings'
  mapping:
    overridable_configurations:
      type: sequence
      label: 'Configurations that can be overridden per domain'
      sequence:
        type: mapping
        mapping:
          name:
            type: label
            label: 'Configuration name'
            translatable: false
          domains:
            type: sequence
            label: 'List of domain ids'
            sequence:
              type: machine_name
              label: 'Domain id'
    disallowed_configurations:
      type: sequence
      label: 'Configurations that cannot be overridden per domain'
      sequence:
        type: label
        label: 'Configuration name'
        translatable: false
