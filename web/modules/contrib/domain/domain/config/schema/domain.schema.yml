# Schema for the configuration files of the Domain module.
domain.settings:
  type: config_object
  label: 'Domain settings'
  mapping:
    allow_non_ascii:
      type: boolean
      label: 'Allow non-ASCII characters'
    www_prefix:
      type: boolean
      label: 'Ignore www prefix when negotiating domains'
    login_paths:
      type: text
      label: 'Paths that should be accessible for inactive domains'
      translatable: false
    css_classes:
      type: label
      label: 'Custom CSS classes to apply to the body tag of each domain'
      translatable: false
    path_prefix:
      type: boolean
      label: 'Enable path prefix support'
    language_negotiation:
      type: boolean
      label: 'Respect per-domain language negotiation'
    allow_destination_domain:
      type: boolean
      label: 'Allow destination domain to be set'

domain.record.*:
  type: config_entity
  label: 'Domain record'
  mapping:
    id:
      type: machine_name
      label: 'ID'
    domain_id:
      type: integer
      label: 'Domain ID'
      constraints:
        Range:
          min: 0
    hostname:
      type: string
      label: 'Hostname'
      constraints:
        DomainHostname: []
        DomainUniqueHostname: []
    name:
      type: required_label
      label: 'Name'
    scheme:
      type: string
      label: 'Scheme'
      constraints:
        Choice:
          choices:
            - http
            - https
            - variable
    status:
      type: boolean
      label: 'Status'
    weight:
      type: weight
      label: 'Weight'
    is_default:
      type: boolean
      label: 'Default domain'
    path_prefix:
      type: string
      label: 'Path prefix'
      constraints:
        Regex:
          pattern: '/^([\p{L}\p{N}][\p{L}\p{N}_\-]*)?$/u'
          message: 'The path prefix may only contain lowercase letters, numbers, hyphens, and underscores, and must start with a letter or number.'

action.configuration.domain_default_action:
  type: action_configuration_default
  label: 'Set default domain record'
action.configuration.domain_delete_action:
  type: action_configuration_default
  label: 'Delete domain record'
action.configuration.domain_disable_action:
  type: action_configuration_default
  label: 'Disable domain record'
action.configuration.domain_enable_action:
  type: action_configuration_default
  label: 'Enable domain record'

block.settings.domain_nav_block:
  type: block_settings
  label: 'Domain navigation block'
  mapping:
    link_options:
      type: string
      label: 'Link paths'
    link_theme:
      type: string
      label: 'Link theme'
    link_label:
      type: string
      label: 'Link text'

condition.plugin.domain:
  type: condition.plugin
  mapping:
    domains:
      type: sequence
      sequence:
        type: machine_name

views.filter.domain_filter:
  type: views.filter.in_operator
  label: 'Domain filter'

views.access.domain:
  type: mapping
  label: 'Domains'
  mapping:
    domain:
      type: sequence
      label: 'List of domains'
      sequence:
        type: machine_name
        label: 'Domain'
