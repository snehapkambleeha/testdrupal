# Schema for the configuration files of the Domain Alias module.
domain_alias.settings:
  type: config_object
  label: 'Domain Alias settings'
  mapping:
    environments:
      type: sequence
      label: 'Development environments'
      constraints:
        NotBlank: []
      sequence:
        type: label
        label: 'Environment'
        translatable: false

domain_alias.alias.*:
  type: config_entity
  label: 'Domain alias'
  mapping:
    id:
      type: machine_name
      label: 'ID'
    domain_id:
      type: machine_name
      label: 'Domain ID'
    pattern:
      type: string
      label: 'Pattern'
      constraints:
        DomainAliasPattern: []
        DomainAliasUniquePattern: []
    redirect:
      type: integer
      label: 'Redirect'
      constraints:
        Choice:
          choices:
            - 0
            - 301
            - 302
    environment:
      type: string
      label: 'Environment'
      constraints:
        DomainAliasEnvironment: []
    weight:
      type: weight
      label: 'Weight'
